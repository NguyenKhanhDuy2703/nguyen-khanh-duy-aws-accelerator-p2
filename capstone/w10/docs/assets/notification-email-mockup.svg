<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="540" fill="#1a1a2e" rx="16"/>

  <!-- Title outside email -->
  <text x="380" y="30" text-anchor="middle" fill="#8899aa" font-size="12" font-weight="600">📧 Sample Email Notification — Amazon Macie Alert</text>

  <!-- Email client chrome -->
  <rect x="40" y="46" width="680" height="476" rx="12" fill="#ffffff"/>

  <!-- Email header bar -->
  <rect x="40" y="46" width="680" height="44" rx="12" fill="#f1f3f4"/>
  <rect x="40" y="70" width="680" height="20" fill="#f1f3f4"/>
  <!-- Window controls -->
  <circle cx="68" cy="68" r="7" fill="#ff5f57"/>
  <circle cx="88" cy="68" r="7" fill="#ffbd2e"/>
  <circle cx="108" cy="68" r="7" fill="#28c840"/>
  <text x="140" y="73" fill="#5a6a7a" font-size="11">Amazon SNS Notification — AWS Account 123456789012</text>

  <!-- Email From/To/Subject -->
  <rect x="40" y="90" width="680" height="70" fill="#f8f9fa"/>
  <text x="60" y="112" fill="#5a6a7a" font-size="10" font-weight="600">From:</text>
  <text x="100" y="112" fill="#1a1a2e" font-size="10">no-reply@sns.amazonaws.com</text>
  <text x="60" y="128" fill="#5a6a7a" font-size="10" font-weight="600">To:</text>
  <text x="100" y="128" fill="#1a1a2e" font-size="10">security-team@yourcompany.com</text>
  <text x="60" y="144" fill="#5a6a7a" font-size="10" font-weight="600">Subject:</text>
  <rect x="100" y="132" width="530" height="18" rx="3" fill="#fce8e6"/>
  <text x="108" y="145" fill="#c5221f" font-size="11" font-weight="700">🚨 Amazon Macie Alert — Sensitive Data Detected</text>

  <!-- Divider -->
  <line x1="40" y1="160" x2="720" y2="160" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Email Body -->
  <!-- Alert banner -->
  <rect x="55" y="172" width="650" height="44" rx="8" fill="#fce8e6"/>
  <text x="80" y="190" fill="#c5221f" font-size="13" font-weight="700">⚠  Amazon Macie has detected sensitive data in your S3 bucket</text>
  <text x="80" y="208" fill="#c5221f" font-size="10">Immediate review recommended — finding severity: HIGH</text>

  <!-- Section: Finding Details -->
  <text x="60" y="235" fill="#202124" font-size="11" font-weight="700">── Finding Details ──────────────────────────────────────</text>
  <rect x="55" y="243" width="650" height="80" rx="6" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>

  <text x="75" y="262" fill="#5a6a7a" font-size="10" font-weight="600">Finding Type:</text>
  <text x="170" y="262" fill="#1a1a2e" font-size="10">SensitiveData:S3Object/Credentials</text>

  <text x="75" y="278" fill="#5a6a7a" font-size="10" font-weight="600">Severity:</text>
  <rect x="168" y="269" width="38" height="14" rx="3" fill="#ea4335"/>
  <text x="187" y="280" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">HIGH</text>

  <text x="75" y="294" fill="#5a6a7a" font-size="10" font-weight="600">Account:</text>
  <text x="170" y="294" fill="#1a1a2e" font-size="10">123456789012</text>
  <text x="350" y="294" fill="#5a6a7a" font-size="10" font-weight="600">Region:</text>
  <text x="395" y="294" fill="#1a1a2e" font-size="10">us-east-1</text>

  <text x="75" y="310" fill="#5a6a7a" font-size="10" font-weight="600">Created At:</text>
  <text x="170" y="310" fill="#1a1a2e" font-size="10">2024-01-15T14:32:07Z</text>

  <!-- Section: Affected Resource -->
  <text x="60" y="340" fill="#202124" font-size="11" font-weight="700">── Affected Resource ────────────────────────────────────</text>
  <rect x="55" y="348" width="650" height="55" rx="6" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>

  <text x="75" y="367" fill="#5a6a7a" font-size="10" font-weight="600">S3 Bucket:</text>
  <text x="150" y="367" fill="#1565c0" font-size="10">capstone-w10-macie-target-yourname</text>

  <text x="75" y="384" fill="#5a6a7a" font-size="10" font-weight="600">Object Key:</text>
  <text x="150" y="384" fill="#1565c0" font-size="10">test-data/credentials-sample.txt</text>

  <!-- Section: Sensitive Data -->
  <text x="60" y="418" fill="#202124" font-size="11" font-weight="700">── Sensitive Data Detected ──────────────────────────────</text>
  <rect x="55" y="426" width="650" height="36" rx="6" fill="#fff3e0" stroke="#ff8c42" stroke-width="1"/>
  <text x="75" y="443" fill="#5a6a7a" font-size="10" font-weight="600">Data Category:</text>
  <text x="165" y="443" fill="#e65100" font-size="10" font-weight="600">CREDENTIALS  ·  AWS_CREDENTIALS  ·  GITHUB_PERSONAL_ACCESS_TOKEN</text>
  <text x="75" y="455" fill="#bf360c" font-size="9">Identified credentials may allow unauthorized access to AWS resources</text>

  <!-- CTA Button -->
  <rect x="55" y="472" width="285" height="32" rx="6" fill="#1a73e8"/>
  <text x="197" y="492" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">🔍 View Finding in Macie Console</text>

  <text x="360" y="490" fill="#5a6a7a" font-size="9">Finding ID: abc12345-6789-def0-1234-abcdef012345</text>

  <!-- Footer of email -->
  <line x1="40" y1="510" x2="720" y2="510" stroke="#e0e0e0" stroke-width="1"/>
  <text x="380" y="525" text-anchor="middle" fill="#9aa0a6" font-size="9">This notification was sent by Amazon SNS · AWS Security · us-east-1</text>
</svg>
