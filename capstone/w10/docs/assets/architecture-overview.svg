<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="960" height="560" fill="#0f1923" rx="16"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Amazon Macie — Sensitive Data Detection Architecture</text>
  <text x="480" y="58" text-anchor="middle" fill="#8899aa" font-size="12">Capstone W10 · AWS Security</text>

  <!-- ══ LANE LABELS ══ -->
  <text x="24" y="105" fill="#8899aa" font-size="11" font-weight="600" transform="rotate(-90,24,105)"></text>

  <!-- ══ STEP NUMBERS TRACK ══ -->
  <!-- Step bubbles -->
  <circle cx="120" cy="290" r="16" fill="#1a73e8"/>
  <text x="120" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <circle cx="270" cy="290" r="16" fill="#1a73e8"/>
  <text x="270" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
  <circle cx="420" cy="290" r="16" fill="#1a73e8"/>
  <text x="420" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <circle cx="570" cy="290" r="16" fill="#1a73e8"/>
  <text x="570" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <circle cx="720" cy="290" r="16" fill="#1a73e8"/>
  <text x="720" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
  <circle cx="870" cy="290" r="16" fill="#34a853"/>
  <text x="870" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">6</text>

  <!-- ══ BOXES ══ -->

  <!-- Box 1: Developer / Test Data -->
  <rect x="50" y="110" width="140" height="140" rx="12" fill="#1c2b3a" stroke="#1a73e8" stroke-width="2"/>
  <!-- S3 icon (simplified) -->
  <rect x="80" y="125" width="80" height="55" rx="6" fill="#1a73e8" opacity="0.25"/>
  <rect x="85" y="130" width="70" height="8" rx="3" fill="#4a9eff"/>
  <rect x="85" y="142" width="50" height="4" rx="2" fill="#4a9eff" opacity="0.7"/>
  <rect x="85" y="150" width="60" height="4" rx="2" fill="#4a9eff" opacity="0.5"/>
  <rect x="85" y="158" width="40" height="4" rx="2" fill="#4a9eff" opacity="0.4"/>
  <text x="120" y="200" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">Amazon S3</text>
  <text x="120" y="215" text-anchor="middle" fill="#8899aa" font-size="10">Target Bucket</text>
  <text x="120" y="230" text-anchor="middle" fill="#8899aa" font-size="9">PII · Financial</text>
  <text x="120" y="242" text-anchor="middle" fill="#8899aa" font-size="9">Credentials · Medical</text>

  <!-- Box 2: Macie -->
  <rect x="200" y="110" width="140" height="140" rx="12" fill="#1c2b3a" stroke="#ff6d00" stroke-width="2"/>
  <!-- Shield icon -->
  <path d="M240 130 L280 130 L280 145 Q280 165 260 175 Q240 165 240 145 Z" fill="#ff6d00" opacity="0.3"/>
  <path d="M245 135 L275 135 L275 148 Q275 163 260 171 Q245 163 245 148 Z" fill="#ff6d00" opacity="0.6"/>
  <text x="253" y="157" fill="#fff" font-size="14" font-weight="700">🔍</text>
  <text x="270" y="200" text-anchor="middle" fill="#ff8c42" font-size="11" font-weight="700">Amazon Macie</text>
  <text x="270" y="215" text-anchor="middle" fill="#8899aa" font-size="10">Classification Job</text>
  <text x="270" y="230" text-anchor="middle" fill="#8899aa" font-size="9">ML-powered scan</text>
  <text x="270" y="242" text-anchor="middle" fill="#8899aa" font-size="9">Managed Identifiers</text>

  <!-- Box 3: Macie Findings -->
  <rect x="350" y="110" width="140" height="140" rx="12" fill="#1c2b3a" stroke="#fbbc04" stroke-width="2"/>
  <rect x="380" y="128" width="80" height="52" rx="5" fill="#fbbc04" opacity="0.2"/>
  <rect x="385" y="133" width="70" height="7" rx="3" fill="#fbbc04" opacity="0.8"/>
  <rect x="385" y="144" width="55" height="4" rx="2" fill="#fbbc04" opacity="0.5"/>
  <rect x="385" y="152" width="65" height="4" rx="2" fill="#fbbc04" opacity="0.5"/>
  <rect x="385" y="160" width="45" height="4" rx="2" fill="#fbbc04" opacity="0.3"/>
  <!-- Severity badge -->
  <rect x="395" y="168" width="30" height="10" rx="4" fill="#ea4335"/>
  <text x="410" y="176" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">HIGH</text>
  <text x="420" y="200" text-anchor="middle" fill="#fbbc04" font-size="11" font-weight="700">Macie Findings</text>
  <text x="420" y="215" text-anchor="middle" fill="#8899aa" font-size="10">Finding Events</text>
  <text x="420" y="230" text-anchor="middle" fill="#8899aa" font-size="9">Severity: High/Med/Low</text>
  <text x="420" y="242" text-anchor="middle" fill="#8899aa" font-size="9">Type + Object details</text>

  <!-- Box 4: EventBridge -->
  <rect x="500" y="110" width="140" height="140" rx="12" fill="#1c2b3a" stroke="#9c27b0" stroke-width="2"/>
  <!-- Event bus icon -->
  <rect x="530" y="128" width="80" height="50" rx="5" fill="#9c27b0" opacity="0.25"/>
  <line x1="530" y1="143" x2="610" y2="143" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="530" y1="153" x2="610" y2="153" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="530" y1="163" x2="610" y2="163" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="548" cy="143" r="4" fill="#ce93d8"/>
  <circle cx="570" cy="153" r="4" fill="#ce93d8"/>
  <circle cx="592" cy="143" r="4" fill="#ce93d8"/>
  <text x="570" y="200" text-anchor="middle" fill="#ce93d8" font-size="11" font-weight="700">EventBridge</text>
  <text x="570" y="215" text-anchor="middle" fill="#8899aa" font-size="10">Event Rules</text>
  <text x="570" y="230" text-anchor="middle" fill="#8899aa" font-size="9">All Findings rule</text>
  <text x="570" y="242" text-anchor="middle" fill="#8899aa" font-size="9">High Severity rule</text>

  <!-- Box 5: SNS -->
  <rect x="650" y="110" width="140" height="140" rx="12" fill="#1c2b3a" stroke="#e91e63" stroke-width="2"/>
  <!-- Bell icon -->
  <path d="M700 132 Q720 128 740 132 L744 155 Q720 160 696 155 Z" fill="#e91e63" opacity="0.35"/>
  <path d="M704 132 Q720 130 736 132 L739 152 Q720 156 701 152 Z" fill="#e91e63" opacity="0.7"/>
  <ellipse cx="720" cy="158" rx="8" ry="4" fill="#e91e63" opacity="0.5"/>
  <text x="720" y="200" text-anchor="middle" fill="#f48fb1" font-size="11" font-weight="700">Amazon SNS</text>
  <text x="720" y="215" text-anchor="middle" fill="#8899aa" font-size="10">macie-alerts topic</text>
  <text x="720" y="230" text-anchor="middle" fill="#8899aa" font-size="9">Email subscription</text>
  <text x="720" y="242" text-anchor="middle" fill="#8899aa" font-size="9">Input transformer</text>

  <!-- Box 6: Email -->
  <rect x="800" y="110" width="140" height="140" rx="12" fill="#1c2b3a" stroke="#34a853" stroke-width="2"/>
  <!-- Email icon -->
  <rect x="830" y="128" width="80" height="55" rx="5" fill="#34a853" opacity="0.2"/>
  <polyline points="830,133 870,158 910,133" fill="none" stroke="#34a853" stroke-width="2" opacity="0.8"/>
  <line x1="830" y1="183" x2="910" y2="183" stroke="#34a853" stroke-width="1.5" opacity="0.5"/>
  <text x="870" y="200" text-anchor="middle" fill="#81c995" font-size="11" font-weight="700">Email Alert</text>
  <text x="870" y="215" text-anchor="middle" fill="#8899aa" font-size="10">Formatted message</text>
  <text x="870" y="230" text-anchor="middle" fill="#8899aa" font-size="9">Finding details</text>
  <text x="870" y="242" text-anchor="middle" fill="#8899aa" font-size="9">Console deep link</text>

  <!-- ══ ARROWS ══ -->
  <!-- Arrow 1→2 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#4a9eff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#ff8c42"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#fbbc04"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#ce93d8"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#f48fb1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#81c995"/>
    </marker>
  </defs>

  <line x1="192" y1="180" x2="198" y2="180" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="191" y1="180" x2="200" y2="180" stroke="#4a9eff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <!-- Scan -->
  <line x1="342" y1="180" x2="348" y2="180" stroke="#ff8c42" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <!-- Findings -->
  <line x1="492" y1="180" x2="498" y2="180" stroke="#fbbc04" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
  <!-- EventBridge -->
  <line x1="642" y1="180" x2="648" y2="180" stroke="#ce93d8" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <!-- SNS -->
  <line x1="792" y1="180" x2="798" y2="180" stroke="#f48fb1" stroke-width="2.5" marker-end="url(#arrowPink)"/>

  <!-- Arrow labels -->
  <text x="195" y="173" text-anchor="middle" fill="#4a9eff" font-size="9">upload</text>
  <text x="345" y="173" text-anchor="middle" fill="#ff8c42" font-size="9">scan</text>
  <text x="495" y="173" text-anchor="middle" fill="#fbbc04" font-size="9">finding event</text>
  <text x="645" y="173" text-anchor="middle" fill="#ce93d8" font-size="9">route</text>
  <text x="795" y="173" text-anchor="middle" fill="#f48fb1" font-size="9">publish</text>

  <!-- ══ BOTTOM LEGEND ══ -->
  <rect x="50" y="360" width="860" height="130" rx="10" fill="#131e2b" stroke="#2a3a4a" stroke-width="1"/>
  <text x="480" y="385" text-anchor="middle" fill="#8899aa" font-size="12" font-weight="700">📦 Test Data Files — What Macie Detects</text>

  <!-- PII Card -->
  <rect x="70" y="395" width="185" height="80" rx="8" fill="#1c2b3a" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="162" y="414" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">🧑 pii-sample.csv</text>
  <text x="162" y="430" text-anchor="middle" fill="#8899aa" font-size="9">• Social Security Numbers (SSN)</text>
  <text x="162" y="443" text-anchor="middle" fill="#8899aa" font-size="9">• Full name · Email · Phone</text>
  <text x="162" y="456" text-anchor="middle" fill="#8899aa" font-size="9">• Date of birth · Address</text>
  <text x="162" y="467" text-anchor="middle" fill="#ea4335" font-size="9" font-weight="600">Severity: HIGH</text>

  <!-- Financial Card -->
  <rect x="270" y="395" width="185" height="80" rx="8" fill="#1c2b3a" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="362" y="414" text-anchor="middle" fill="#fbbc04" font-size="11" font-weight="700">💳 financial-sample.csv</text>
  <text x="362" y="430" text-anchor="middle" fill="#8899aa" font-size="9">• Credit card numbers (Visa, MC)</text>
  <text x="362" y="443" text-anchor="middle" fill="#8899aa" font-size="9">• Bank account + routing numbers</text>
  <text x="362" y="456" text-anchor="middle" fill="#8899aa" font-size="9">• CVV codes · Expiry dates</text>
  <text x="362" y="467" text-anchor="middle" fill="#ea4335" font-size="9" font-weight="600">Severity: HIGH</text>

  <!-- Credentials Card -->
  <rect x="470" y="395" width="185" height="80" rx="8" fill="#1c2b3a" stroke="#ff6d00" stroke-width="1.5"/>
  <text x="562" y="414" text-anchor="middle" fill="#ff8c42" font-size="11" font-weight="700">🔑 credentials-sample.txt</text>
  <text x="562" y="430" text-anchor="middle" fill="#8899aa" font-size="9">• AWS Access Key IDs</text>
  <text x="562" y="443" text-anchor="middle" fill="#8899aa" font-size="9">• API keys · Passwords</text>
  <text x="562" y="456" text-anchor="middle" fill="#8899aa" font-size="9">• OAuth tokens · SSH keys</text>
  <text x="562" y="467" text-anchor="middle" fill="#ea4335" font-size="9" font-weight="600">Severity: HIGH</text>

  <!-- Medical Card -->
  <rect x="670" y="395" width="185" height="80" rx="8" fill="#1c2b3a" stroke="#34a853" stroke-width="1.5"/>
  <text x="762" y="414" text-anchor="middle" fill="#81c995" font-size="11" font-weight="700">🏥 medical-sample.json</text>
  <text x="762" y="430" text-anchor="middle" fill="#8899aa" font-size="9">• Patient SSN + Date of birth</text>
  <text x="762" y="443" text-anchor="middle" fill="#8899aa" font-size="9">• ICD codes · Diagnoses</text>
  <text x="762" y="456" text-anchor="middle" fill="#8899aa" font-size="9">• Prescriptions · Insurance ID</text>
  <text x="762" y="467" text-anchor="middle" fill="#ea4335" font-size="9" font-weight="600">Severity: HIGH</text>

  <!-- Footer -->
  <text x="480" y="535" text-anchor="middle" fill="#3a4a5a" font-size="10">Capstone W10 · Amazon Macie · AWS Security · IaC with Terraform</text>
</svg>
