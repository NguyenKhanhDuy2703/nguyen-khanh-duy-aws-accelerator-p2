  <text x="664" y="152" fill="#8899aa" font-size="9">• Finding type: SensitiveData:S3Object/Credentials</text>
  <text x="664" y="164" fill="#8899aa" font-size="9">• Identifiers: AWS Key, API Key, Password</text>
  <text x="664" y="176" fill="#8899aa" font-size="9">• Severity: HIGH (most critical)</text>
  <text x="664" y="188" fill="#8899aa" font-size="9">• SNS email triggered: ✓ Both rules fire</text>
  <text x="664" y="204" fill="#5a6a7a" font-size="9">Command: aws s3 cp test-data/credentials-sample.txt s3://</text>
