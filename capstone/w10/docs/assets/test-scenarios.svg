  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Test Use Cases — Amazon Macie Sensitive Data Detection</text>
  <text x="480" y="56" text-anchor="middle" fill="#8899aa" font-size="11">6 scenarios covering all finding types and notification paths</text>

  <!-- ══ TC-01 ══ -->
  <rect x="30" y="76" width="275" height="155" rx="10" fill="#1c2b3a" stroke="#4a9eff" stroke-width="2"/>
  <!-- Header -->
  <rect x="30" y="76" width="275" height="32" rx="10" fill="#1a3a5a"/>
  <rect x="30" y="92" width="275" height="16" fill="#1a3a5a"/>
  <text x="44" y="97" fill="#4a9eff" font-size="10" font-weight="700">TC-01</text>
  <text x="80" y="97" fill="#ffffff" font-size="10" font-weight="600">PII Detection — CSV File</text>
  <rect x="218" y="81" width="75" height="16" rx="4" fill="#1a73e8"/>
  <text x="255" y="93" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">UPLOAD FILE</text>

  <text x="44" y="124" fill="#8899aa" font-size="9" font-weight="600">Test File:</text>
  <text x="100" y="124" fill="#81c995" font-size="9">pii-sample.csv</text>
  <text x="44" y="138" fill="#8899aa" font-size="9" font-weight="600">Expects:</text>
  <text x="44" y="152" fill="#8899aa" font-size="9">• Finding type: SensitiveData:S3Object/Personal</text>
  <text x="44" y="164" fill="#8899aa" font-size="9">• Identifiers: SSN, Name, Phone, Email, DOB</text>
  <text x="44" y="176" fill="#8899aa" font-size="9">• Severity: HIGH</text>
  <text x="44" y="188" fill="#8899aa" font-size="9">• SNS email triggered: ✓ Both rules fire</text>
  <text x="44" y="204" fill="#5a6a7a" font-size="9">Command: aws s3 cp test-data/pii-sample.csv s3://&lt;bucket&gt;/new/</text>
  <!-- Status badge -->
  <rect x="210" y="195" width="80" height="26" rx="6" fill="#1e3a1e"/>
  <text x="250" y="212" text-anchor="middle" fill="#34a853" font-size="10" font-weight="700">⬤ HIGH</text>

