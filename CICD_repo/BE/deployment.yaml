apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: fullstack-namespace
spec:
  replicas: 2 # Chạy 2 bản sao Backend để chịu tải
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: nkd7059181/backend:latest
          ports:
            - containerPort: 8080
