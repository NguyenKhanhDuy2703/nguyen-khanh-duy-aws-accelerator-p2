apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend-rollout
  namespace: fullstack-namespace
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: nkd7059181/backend:af3f335457c32a3e8344f92125b0f7749f8d4f9a
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: VERSION
              value: "v1.0"
            - name: ERROR_RATE
              value: "0"
  strategy:
    canary:
      # Canary Service để test version mới
      canaryService: backend-canary-svc
      # Stable Service cho production traffic
      stableService: backend-svc
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - analysis:
            templates:
              - templateName: backend-success-rate
            args:
              - name: service-name
                value: backend-svc
        - setWeight: 50
        - pause: {duration: 30s}
        - analysis:
            templates:
              - templateName: backend-success-rate
            args:
              - name: service-name
                value: backend-svc
        - setWeight: 100
