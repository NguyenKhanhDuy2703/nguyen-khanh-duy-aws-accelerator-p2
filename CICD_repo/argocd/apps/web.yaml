apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd # App con cũng nằm trong argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/NguyenKhanhDuy2703/nguyen-khanh-duy-aws-accelerator-p2.git'
    targetRevision: main
    path: cloud/w9/exercise/k8s/dev # Nơi chứa file Deployment, Service thật của môi trường DEV
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev-env # ĐÂY MỚI LÀ NƠI APP THẬT CHẠY (Pods, Services sẽ sinh ra ở đây)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Tự động tạo namespace dev-env nếu chưa có