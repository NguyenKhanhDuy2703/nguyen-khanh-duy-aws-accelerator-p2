apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<ban>/gitops.git
    targetRevision: main
    path: CICD_repo
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
