apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/NguyenKhanhDuy2703/nguyen-khanh-duy-aws-accelerator-p2.git'
    targetRevision: HEAD
    path: CICD_repo/FE
    directory:
      include: "deployment.yaml,service.yaml,nginx-config.yaml,namespace.yaml"
      exclude: "package.json,package-lock.json,vite.config.js,src/**"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: fullstack-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true