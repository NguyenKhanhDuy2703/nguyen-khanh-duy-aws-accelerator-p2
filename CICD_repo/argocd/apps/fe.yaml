apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/NguyenKhanhDuy2703/nguyen-khanh-duy-aws-accelerator-p2.git'
    targetRevision: HEAD
    path: CICD_repo/FE
    directory:
      include: '*.yaml'
      exclude: 'node_modules/**,dist/**,src/**,package*.json,vite.config.js,.dockerignore,Dockerfile'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: fullstack-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true