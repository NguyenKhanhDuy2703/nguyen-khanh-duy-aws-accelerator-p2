apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: hello-gitops
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
      ports:
      - containerPort: 80
