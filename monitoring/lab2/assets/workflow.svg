<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 600">
  <defs>
    <style>
      .step { fill: #fff; stroke: #232F3E; stroke-width: 2; }
      .step-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #232F3E; }
      .step-text { font-family: Arial, sans-serif; font-size: 11px; fill: #545B64; }
      .arrow { stroke: #D13212; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .time { font-family: Arial, sans-serif; font-size: 10px; fill: #D13212; font-style: italic; }
      .number { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #fff; }
      .circle { fill: #D13212; }
      .warning { fill: #FF9900; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D13212" />
    </marker>
  </defs>
  
  <text x="375" y="25" text-anchor="middle" class="step-title" font-size="17" fill="#D13212">🚨 Root Login Monitoring - Test Workflow</text>
  
  <circle cx="30" cy="70" r="18" class="circle"/>
  <text x="30" y="76" text-anchor="middle" class="number">1</text>
  <rect x="60" y="50" width="200" height="60" class="step" rx="5"/>
  <text x="160" y="70" text-anchor="middle" class="step-title">Deploy Infrastructure</text>
  <text x="160" y="88" text-anchor="middle" class="step-text">terraform init</text>
  <text x="160" y="102" text-anchor="middle" class="step-text">terraform apply</text>
  <text x="270" y="65" class="time">⏱ 4-5 phút</text>
  
  <path d="M 160 110 L 160 140" class="arrow"/>
  
  <circle cx="30" cy="160" r="18" class="circle"/>
  <text x="30" y="166" text-anchor="middle" class="number">2</text>
  <rect x="60" y="140" width="200" height="60" class="step" rx="5"/>
  <text x="160" y="160" text-anchor="middle" class="step-title">Confirm SNS Email</text>
  <text x="160" y="178" text-anchor="middle" class="step-text">Check inbox + spam</text>
  <text x="160" y="192" text-anchor="middle" class="step-text">Click "Confirm subscription"</text>
  <text x="270" y="155" class="time">⏱ 1 phút</text>
  
  <path d="M 160 200 L 160 230" class="arrow"/>
  
  <circle cx="30" cy="250" r="18" class="circle"/>
  <text x="30" y="256" text-anchor="middle" class="number">3</text>
  <rect x="60" y="230" width="200" height="60" class="step" rx="5"/>
  <text x="160" y="250" text-anchor="middle" class="step-title">Wait for CloudTrail</text>
  <text x="160" y="268" text-anchor="middle" class="step-text">CloudTrail cần 2-3 phút</text>
  <text x="160" y="282" text-anchor="middle" class="step-text">để bắt đầu ghi logs</text>
  <text x="270" y="245" class="time">⏱ 2-3 phút</text>
  
  <path d="M 160 290 L 160 320" class="arrow"/>
  
  <circle cx="30" cy="340" r="18" class="warning"/>
  <text x="30" y="346" text-anchor="middle" class="number">4</text>
  <rect x="60" y="320" width="200" height="75" class="step" stroke="#FF9900" stroke-width="3" rx="5"/>
  <text x="160" y="340" text-anchor="middle" class="step-title" fill="#D13212">⚠️ Logout IAM User</text>
  <text x="160" y="358" text-anchor="middle" class="step-text">Sign out khỏi Console</text>
  <text x="160" y="373" text-anchor="middle" class="step-text" font-size="10">Chuẩn bị email root</text>
  <text x="160" y="387" text-anchor="middle" class="step-text" font-size="10">+ password</text>
  <text x="270" y="345" class="time">⏱ 1 phút</text>
  
  <path d="M 160 395 L 160 425" class="arrow"/>
  
  <circle cx="30" cy="445" r="18" class="warning"/>
  <text x="30" y="451" text-anchor="middle" class="number">5</text>
  <rect x="60" y="425" width="200" height="60" class="step" stroke="#FF9900" stroke-width="3" rx="5"/>
  <text x="160" y="445" text-anchor="middle" class="step-title" fill="#D13212">🔐 Login Root Account</text>
  <text x="160" y="463" text-anchor="middle" class="step-text">Dùng email + password root</text>
  <text x="160" y="477" text-anchor="middle" class="step-text" font-size="10">Đừng làm gì - chỉ login!</text>
  <text x="270" y="440" class="time">⏱ 1 phút</text>
  
  <path d="M 260 455 L 330 455" class="arrow"/>
  
  <circle cx="480" cy="70" r="18" class="circle"/>
  <text x="480" y="76" text-anchor="middle" class="number">6</text>
  <rect x="340" y="50" width="200" height="75" class="step" rx="5"/>
  <text x="440" y="70" text-anchor="middle" class="step-title">⏱️ Wait for Logs</text>
  <text x="440" y="88" text-anchor="middle" class="step-text" fill="#D13212" font-weight="bold">CloudTrail delay: 5-15 phút</text>
  <text x="440" y="103" text-anchor="middle" class="step-text" font-size="10">Refresh CloudWatch Logs</text>
  <text x="440" y="117" text-anchor="middle" class="step-text" font-size="10">mỗi 2-3 phút</text>
  <text x="550" y="65" class="time">⏱ 5-15 phút</text>
  
  <path d="M 440 125 L 440 155" class="arrow"/>
  
  <circle cx="480" cy="175" r="18" class="circle"/>
  <text x="480" y="181" text-anchor="middle" class="number">7</text>
  <rect x="340" y="155" width="200" height="60" class="step" rx="5"/>
  <text x="440" y="175" text-anchor="middle" class="step-title">Check Logs Arrived</text>
  <text x="440" y="193" text-anchor="middle" class="step-text">Tìm "ConsoleLogin" event</text>
  <text x="440" y="207" text-anchor="middle" class="step-text">userIdentity.type = "Root"</text>
  <text x="550" y="170" class="time">⏱ 2 phút</text>
  
  <path d="M 440 215 L 440 245" class="arrow"/>
  
  <circle cx="480" cy="265" r="18" class="circle"/>
  <text x="480" y="271" text-anchor="middle" class="number">8</text>
  <rect x="340" y="245" width="200" height="60" class="step" rx="5"/>
  <text x="440" y="265" text-anchor="middle" class="step-title">Metric Filter Triggered</text>
  <text x="440" y="283" text-anchor="middle" class="step-text">RootAccountLoginCount = 1</text>
  <text x="440" y="297" text-anchor="middle" class="step-text">Alarm → "In alarm" 🔴</text>
  <text x="550" y="260" class="time">⏱ 1 phút</text>
  
  <path d="M 440 305 L 440 335" class="arrow"/>
  
  <circle cx="480" cy="355" r="18" class="circle"/>
  <text x="480" y="361" text-anchor="middle" class="number">9</text>
  <rect x="340" y="335" width="200" height="60" class="step" rx="5"/>
  <text x="440" y="355" text-anchor="middle" class="step-title">📧 Receive Email Alert</text>
  <text x="440" y="373" text-anchor="middle" class="step-text" fill="#D13212" font-weight="bold">CRITICAL: Root login!</text>
  <text x="440" y="387" text-anchor="middle" class="step-text">Check email inbox</text>
  <text x="550" y="350" class="time">⏱ Ngay lập tức</text>
  
  <path d="M 440 395 L 440 425" class="arrow"/>
  
  <circle cx="480" cy="445" r="18" class="warning"/>
  <text x="480" y="451" text-anchor="middle" class="number">10</text>
  <rect x="340" y="425" width="200" height="60" class="step" stroke="#FF9900" stroke-width="3" rx="5"/>
  <text x="440" y="445" text-anchor="middle" class="step-title" fill="#D13212">⚠️ Logout Root NOW!</text>
  <text x="440" y="463" text-anchor="middle" class="step-text">Sign out khỏi root</text>
  <text x="440" y="477" text-anchor="middle" class="step-text">Login lại IAM user</text>
  <text x="550" y="440" class="time">⏱ 1 phút</text>
  
  <path d="M 440 485 L 440 515" class="arrow"/>
  
  <circle cx="480" cy="535" r="18" class="circle"/>
  <text x="480" y="541" text-anchor="middle" class="number">11</text>
  <rect x="340" y="515" width="200" height="60" class="step" rx="5"/>
  <text x="440" y="535" text-anchor="middle" class="step-title">Take Screenshots</text>
  <text x="440" y="553" text-anchor="middle" class="step-text">CloudTrail, Logs, Alarm</text>
  <text x="440" y="567" text-anchor="middle" class="step-text">Metric Filter, Email</text>
  <text x="550" y="530" class="time">⏱ 5 phút</text>
  
  <circle cx="685" cy="175" r="18" class="circle"/>
  <text x="685" y="181" text-anchor="middle" class="number">12</text>
  <rect x="595" y="155" width="180" height="60" class="step" rx="5"/>
  <text x="685" y="175" text-anchor="middle" class="step-title">Cleanup Resources</text>
  <text x="685" y="193" text-anchor="middle" class="step-text">terraform destroy</text>
  <text x="685" y="207" text-anchor="middle" class="step-text">Delete CloudTrail logs</text>
  <text x="630" y="230" class="time">⏱ 3-4 phút</text>
  
  <path d="M 540 545 L 685 545 L 685 215" class="arrow"/>
  
  <rect x="50" y="520" width="270" height="60" fill="#FFF3CD" stroke="#FF9900" stroke-width="2" rx="5"/>
  <text x="185" y="542" text-anchor="middle" class="step-title" fill="#D13212">⏱️ Total Time: ~35-40 phút</text>
  <text x="185" y="558" text-anchor="middle" class="step-text" font-size="10">Chủ yếu chờ CloudTrail ghi logs (5-15 phút)</text>
  <text x="185" y="572" text-anchor="middle" class="step-text" font-size="10" fill="#D13212">⚠️ Root login = HIGH RISK - Test cẩn thận!</text>
</svg>
