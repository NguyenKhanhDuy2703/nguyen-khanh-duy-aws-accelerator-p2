apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  labels:
    app: system
spec:
  replicas: 4
  selector:
    matchLabels:
      app: system
  template:
    metadata:
      labels:
        app: system
    spec:
      containers:
      - name: kube-container
        image: kube-container
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"      
            memory: "64Mi"  
          limits:
            cpu: "200m"      
            memory: "128Mi"  
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10  
          periodSeconds: 20
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: NodePort
  selector:
    app: system
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
