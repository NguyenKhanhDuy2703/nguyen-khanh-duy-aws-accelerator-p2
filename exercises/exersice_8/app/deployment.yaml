apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  labels:
    app: system
spec:
  replicas: 2  # HPA sẽ tự điều chỉnh từ 2 → 8 tùy CPU/memory load
  selector:
    matchLabels:
      app: system
  template:
    metadata:
      labels:
        app: system
    spec:
      containers:
      - name: kube-container
        image: kube-container
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"      
            memory: "64Mi"  
          limits:
            cpu: "200m"      
            memory: "128Mi"  
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10  
          periodSeconds: 20
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: NodePort
  selector:
    app: system
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080

---

# HorizontalPodAutoscaler — tự động scale dựa trên CPU
# Yêu cầu: metrics-server đã được enable (minikube addons enable metrics-server)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-app-deployment
  minReplicas: 2   # tối thiểu 2 Pod (high availability)
  maxReplicas: 8   # tối đa 8 Pod (t3.medium: 2 vCPU, 4GB đủ chỗ)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60  # scale up khi CPU trung bình > 60%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70  # scale up khi memory trung bình > 70%
