name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'CICD_repo/FE/**'
      - 'CICD_repo/BE/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    if: contains(github.event.head_commit.modified, 'CICD_repo/FE/')
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq
      - name: Build and Push FE
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }} ./CICD_repo/FE
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
      - name: Update FE manifest
        run: |
          # Dùng yq (cần cài đặt sudo apt-get install -y yq)
          yq -i '.spec.template.spec.containers[0].image = "${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}"' ./CICD_repo/FE/deployment.yaml
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add ./CICD_repo/FE/deployment.yaml
          git commit -m "Update FE image to ${{ github.sha }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} main

  build-backend:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    if: contains(github.event.head_commit.modified, 'CICD_repo/BE/')
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq
      - name: Build and Push BE
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }} ./CICD_repo/BE
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
      - name: Update BE manifest
        run: |
          yq -i '.spec.template.spec.containers[0].image = "${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}"' ./CICD_repo/BE/deployment.yaml
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add ./CICD_repo/BE/deployment.yaml
          git commit -m "Update BE image to ${{ github.sha }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} main